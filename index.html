<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PubliCity Day Fast</title>
    <style>
        body {
            background-color: black;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
            padding: 40px;
            margin: 0;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .card {
            background: #111;
            margin: 30px auto;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            border-radius: 12px;
            transition: all 0.3s;
        }

        .card:hover {
            background: #222;
            transform: translateY(-5px);
        }

        h2 {
            margin-top: 0;
            color: #4fc3f7;
        }
    </style>
</head>
<body>

    <h1>PubliCity Day Fast</h1>
    <p>Publicidad de productos modernos</p>

    <div class="card">
        <h2>Ropa</h2>
        <p>Ropa moderna para todos</p>
    </div>

    <div class="card">
        <h2>Cocinas</h2>
        <p>Utensilios y accesorios modernos</p>
    </div>

    <div class="card">
        <h2>Hogar</h2>
        <p>Todo lo que necesitas para tu casa</p>
    </div>

</body>
</html>
